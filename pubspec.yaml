name: emi_locker
description: "EMI Locker - Enterprise Android Device Management Application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Networking
  dio: ^5.4.3+1
  socket_io_client: ^2.0.3+1

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.1

  # Charts
  fl_chart: ^0.67.0

  # Device Info
  device_info_plus: ^10.1.0

  # Permissions
  permission_handler: ^11.3.1

  # Fonts & Icons
  google_fonts: ^6.2.1

  # Animations
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  lottie: ^3.1.3

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  equatable: ^2.0.5
  package_info_plus: ^8.0.0
  connectivity_plus: ^6.0.3
  battery_plus: ^6.0.1
  flutter_local_notifications: ^17.2.2
  local_auth: ^2.2.0
  url_launcher: ^6.2.6
  image_picker: ^1.1.2
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
